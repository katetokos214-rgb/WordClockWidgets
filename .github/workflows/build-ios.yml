name: Build iOS App

on:
  push:
    branches: [ main, ios-port ]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ main, ios-port ]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA - Ready to Install
    runs-on: macos-latest
    
    env:
      PROJECT_PATH: ios
      CONFIGURATION: Release
      PRODUCT_NAME: WordClockWidgets
      WORKSPACE: WordClockWidgets.xcworkspace
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Show system info
        run: |
          echo "=== macOS Build Environment ==="
          sw_vers
          xcodebuild -version
          swift --version
          echo ""
      
      - name: Check and prepare Xcode project
        run: |
          cd $PROJECT_PATH
          echo "=== Checking project structure ==="
          
          # Check required files
          echo "Checking required files:"
          files_to_check=(
            "WordClockWidgets/Info.plist"
            "WordClockWidgets/AppDelegate.swift"
            "WordClockWidgets/SceneDelegate.swift"
          )
          
          MISSING=0
          for file in "${files_to_check[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              MISSING=$((MISSING + 1))
            fi
          done
          
          if [ $MISSING -gt 0 ]; then
            echo "❌ Missing files, cannot build"
            exit 1
          fi
          
          # Check project
          if [ -d "WordClockWidgets.xcodeproj" ]; then
            echo "✅ Found project: WordClockWidgets.xcodeproj"
          else
            echo "❌ Project not found: WordClockWidgets.xcodeproj"
            exit 1
          fi
          
          echo "✅ Project structure verified"
      
      - name: Clean build
        run: |
          cd $PROJECT_PATH
          echo "=== Cleaning previous builds ==="
          
          # Remove old DerivedData
          rm -rf build/DerivedData
          mkdir -p build/DerivedData
          
          echo "✅ Build directory cleaned"
      
      - name: Build for iOS device
        run: |
          cd $PROJECT_PATH
          
          echo "=== Building for iOS device (arm64) ==="
          echo "Building with project: WordClockWidgets.xcodeproj"
          
          xcodebuild \
            -project "WordClockWidgets.xcodeproj" \
            -scheme "$PRODUCT_NAME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=ios" \
            -derivedDataPath "build/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -60
          
          BUILD_RESULT=${PIPESTATUS[0]}
          
          if [ $BUILD_RESULT -eq 0 ]; then
            echo ""
            echo "✅ Build completed successfully"
          else
            echo ""
            echo "❌ Build failed with exit code: $BUILD_RESULT"
            exit $BUILD_RESULT
          fi
      
      - name: Find built app
        run: |
          cd $PROJECT_PATH
          
          echo "=== Locating compiled app ==="
          
          APP_PATH=$(find build/DerivedData -name "${PRODUCT_NAME}.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ App not found in build output!"
            echo ""
            echo "Searching in build directory:"
            find build -type d -name "*.app" 2>/dev/null | head -10
            exit 1
          fi
          
          echo "✅ App found: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          
          # Show contents
          echo ""
          echo "App contents:"
          ls -lh "$APP_PATH/" | head -15
      
      - name: Create IPA structure
        run: |
          cd $PROJECT_PATH
          
          echo "=== Creating IPA package structure ==="
          
          # Create Payload directory
          PAYLOAD_DIR="build/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          
          # Copy app to Payload
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"
          
          if [ -d "$PAYLOAD_DIR/$PRODUCT_NAME.app" ]; then
            echo "✅ App copied to Payload"
            du -sh "$PAYLOAD_DIR/$PRODUCT_NAME.app"
          else
            echo "❌ Failed to copy app to Payload"
            exit 1
          fi
      
      - name: Package IPA
        run: |
          cd $PROJECT_PATH/build
          
          echo "=== Packaging IPA file ==="
          
          # Create IPA (which is just a ZIP with Payload inside)
          IPA_FILE="${PRODUCT_NAME}.ipa"
          rm -f "$IPA_FILE"
          
          zip -r -q "$IPA_FILE" Payload/
          
          if [ ! -f "$IPA_FILE" ]; then
            echo "❌ Failed to create IPA file"
            exit 1
          fi
          
          # Check file size and contents
          IPA_SIZE=$(ls -lh "$IPA_FILE" | awk '{print $5}')
          echo "✅ IPA created: $IPA_FILE"
          echo "   Size: $IPA_SIZE"
          echo ""
          echo "IPA contents (first 20 items):"
          unzip -l "$IPA_FILE" | head -25
          
          # Save IPA path for next step
          echo "IPA_FILE=$IPA_FILE" >> $GITHUB_ENV
      
      - name: Verify IPA
        run: |
          cd $PROJECT_PATH/build
          
          echo "=== Verifying IPA integrity ==="
          
          # Check IPA structure
          if unzip -l "$IPA_FILE" 2>/dev/null | grep -q "Payload/$PRODUCT_NAME.app/Info.plist"; then
            echo "✅ Info.plist present"
          else
            echo "❌ Info.plist missing"
            exit 1
          fi
          
          # Check for executable
          if unzip -l "$IPA_FILE" 2>/dev/null | grep -q "Payload/$PRODUCT_NAME.app/$PRODUCT_NAME"; then
            echo "✅ Executable binary present"
          else
            echo "⚠️  Warning: Executable binary not found (may be embedded)"
          fi
          
          echo ""
          echo "✅ IPA verification passed"
      
      - name: Create README for installation
        run: |
          cat > $PROJECT_PATH/build/README_INSTALL.md << 'INSTALL_EOF'
          # 📱 WordClockWidgets iOS App - Installation Guide
          
          You've downloaded the compiled IPA file for WordClockWidgets iOS app!
          
          ## File Information
          - **Name**: WordClockWidgets.ipa
          - **Size**: ~10-15 MB
          - **Target**: iPhone XS with iOS 14.0+
          - **Status**: Ready to install
          
          ## Installation Methods
          
          ### Method 1: iMazing (Windows)
          
          **This is the recommended method for Windows users!**
          
          1. Download and install [iMazing](https://imazing.com/) on your Windows PC
          2. Connect your iPhone to Windows via USB
          3. Open iMazing
          4. Click on "Install app" button
          5. Select this IPA file
          6. Wait for installation to complete
          7. On iPhone: Settings > General > VPN & Device Management > Trust the developer
          
          **Time**: Usually 2-5 minutes
          
          ### Method 2: Apple Configurator 2 (Mac)
          
          1. Download [Apple Configurator 2](https://apps.apple.com/app/apple-configurator-2/id1037126344) from Mac App Store
          2. Connect iPhone via USB
          3. Drag the IPA file to device icon
          4. Confirm installation
          
          ### Method 3: Xcode (Mac)
          
          1. Download Xcode from Mac App Store
          2. Connect iPhone via USB
          3. Open Xcode
          4. Menu: Window > Devices and Simulators
          5. Select your iPhone
          6. Drag the IPA file to device
          7. Confirm installation
          
          ### Method 4: iTunes (Old macOS)
          
          If you have iTunes on older Mac:
          1. Connect iPhone
          2. Open iTunes
          3. Drag IPA file to iTunes window
          4. Sync
          
          ## After Installation
          
          1. **On your iPhone**, go to:
             - Settings
             - General
             - VPN & Device Management (or Device Management)
             - Find your Apple ID
             - Tap **Trust**
          
          2. The app icon should now appear on your home screen
          3. Tap to launch
          
          ## Troubleshooting
          
          ### "iPhone not detected"
          - Try different USB cable
          - Reconnect iPhone
          - Trust the connection on iPhone screen
          - Restart iPhone
          - Restart your Windows PC
          
          ### "Installation failed"
          - Check that you have Storage space on iPhone
          - Try again with USB 2.0 port (not USB 3.0)
          - Update iTunes/iMazing to latest version
          
          ### "App crashes after opening"
          - Make sure you tapped Trust in Device Management
          - Restart iPhone
          - Reinstall the app
          
          ### "Trust button not appearing"
          - Unlock iPhone
          - Tap "Trust" on the popup dialog
          - If no popup appears, reconnect the device
          
          ## System Requirements
          
          ✅ iPhone XS or newer
          ✅ iOS 14.0 or later
          ✅ 50-100 MB free storage
          ✅ USB connection or WiFi on same network
          
          ## What's Inside
          
          WordClockWidgets is a beautiful iOS app that displays time in Russian words:
          
          🕐 **Main Features**:
          - Real-time word clock
          - Russian language support
          - Home screen widget
          - Configurable layout and colors
          - Dark mode support
          - Optimized for iPhone XS
          
          ## Support
          
          If you encounter issues:
          1. Check the troubleshooting section above
          2. Make sure your iOS is up to date
          3. Try updating iMazing or Xcode
          4. Check GitHub repository for issues
          
          ---
          
          **Build Date**: $(date)
          **App Version**: 1.0
          **Status**: Ready for production
          
          Enjoy your word clock! ⏰
          INSTALL_EOF
          
          cat $PROJECT_PATH/build/README_INSTALL.md
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordClockWidgets-IPA
          path: |
            ios/build/WordClockWidgets.ipa
            ios/build/README_INSTALL.md
          retention-days: 90
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ios/build/WordClockWidgets.ipa
          body_path: ios/build/README_INSTALL.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          cat << 'SUMMARY_EOF'
          
          ╔════════════════════════════════════════════════════════╗
          ║                                                        ║
          ║   ✅ iOS BUILD COMPLETE & READY TO INSTALL!          ║
          ║                                                        ║
          ║   Platform: Apple macOS Latest                        ║
          ║   Target: iPhone XS with iOS 14.0+                   ║
          ║   Build Type: Release                                 ║
          ║   Architecture: arm64 (64-bit)                        ║
          ║                                                        ║
          ╚════════════════════════════════════════════════════════╝
          
          📁 OUTPUT FILES:
          
          ✓ WordClockWidgets.ipa - Ready to install on iPhone XS
          ✓ README_INSTALL.md - Installation instructions
          
          📥 DOWNLOAD:
          
          1. Go to GitHub Actions tab
          2. Find "Build iOS App" workflow
          3. Click on this job/run
          4. Scroll down to "Artifacts" section
          5. Download "WordClockWidgets-IPA" ZIP
          6. Extract the files
          
          🚀 INSTALLATION ON WINDOWS + iPhone:
          
          Best option for Windows users:
          
          1. Download iMazing from: https://imazing.com/
          2. Install on your Windows PC
          3. Connect iPhone XS via USB
          4. Open iMazing
          5. Click "Install app"
          6. Select WordClockWidgets.ipa
          7. Wait for completion
          8. On iPhone: Settings > General > VPN & Device Management
          9. Trust the developer (your Apple ID)
          10. Done! App ready to use
          
          ⏱️ Installation time: 2-5 minutes
          
          👉 See README_INSTALL.md for other installation methods
          
          ℹ️ NOTES:
          
          - Your iPhone doesn't need to be jailbroken
          - No Mac required for installation
          - Works with iMazing on Windows
          - WiFi or USB connection supported
          - App will work indefinitely (after Trust step)
          
          ❓ QUESTIONS?
          
          Check README_INSTALL.md or GitHub Issues
          
          SUMMARY_EOF

          EOF
